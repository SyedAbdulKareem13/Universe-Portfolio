<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Earth">
  <defs>
    <radialGradient id="ocean" cx="40%" cy="33%" r="72%">
      <stop offset="0%" stop-color="#56abef"/>
      <stop offset="55%" stop-color="#1f6fd0"/>
      <stop offset="100%" stop-color="#0a387f"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#7cc8ff" stop-opacity="0"/>
      <stop offset="93%" stop-color="#8fd2ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8fd2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#62d487"/>
      <stop offset="100%" stop-color="#2c8a46"/>
    </linearGradient>
    <clipPath id="globe"><circle cx="32" cy="32" r="27"/></clipPath>
  </defs>
  <!-- atmosphere glow -->
  <circle cx="32" cy="32" r="31" fill="url(#atmo)"/>
  <!-- ocean -->
  <circle cx="32" cy="32" r="27" fill="url(#ocean)"/>
  <!-- continents (stylised landmasses) -->
  <g clip-path="url(#globe)" fill="url(#land)">
    <path d="M12 20c4-4 9-3 11 1 2 4-1 7 1 10 2 4-1 8-5 9-5 1-9-3-10-8-1-5 0-10 3-12z"/>
    <path d="M31 11c6-2 12 1 13 7 1 5-3 7-1 11 2 5-3 9-8 9-6 0-9-5-8-11 0-5-2-9 1-13 1-2 2-3 3-3z"/>
    <path d="M45 31c5-1 9 3 8 8-1 5-6 7-10 4-3-3-2-8 0-10 1-1 1-2 2-2z"/>
    <path d="M19 41c4-1 8 2 7 6-1 4-6 5-9 2-2-3-1-7 1-8z"/>
    <circle cx="50" cy="21" r="2.3"/>
    <circle cx="16" cy="40" r="1.6"/>
  </g>
  <!-- glossy highlight -->
  <ellipse cx="23" cy="21" rx="9" ry="5.5" fill="#ffffff" opacity="0.16"/>
  <!-- thin atmosphere rim -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#a6dbff" stroke-opacity="0.45" stroke-width="1"/>
</svg>
